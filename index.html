<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Kala Residency Admin</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5B4FCF">

<!-- Android / Chrome -->
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KR Admin">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3061/3061341.png">

<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    background: #5B4FCF;
  }
  iframe {
    border: none;
    width: 100%;
    height: 100%;
    display: block;
  }
  #loader {
    position: fixed; inset: 0;
    background: #5B4FCF;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    color: #fff; font-family: system-ui, sans-serif; font-size: 15px;
    z-index: 10;
    transition: opacity .3s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div>Loading Kala Residency…</div>
  </div>

  <!-- 🔧 REPLACE THIS with your actual Apps Script /exec URL -->
  <iframe id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwP13HyRIvQQ078okxsEUE9uQxxtUFocbAtVKctoLUWPjdSzzHB4kKNNgxjNhCWvkKE/exec?page=admin"
    onload="document.getElementById('loader').classList.add('hidden')"
    allow="clipboard-write"
  ></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.error('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
